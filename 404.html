<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Engineer Playbook Navigation Config</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Oat UI -->
    <link rel="stylesheet" href="https://unpkg.com/@knadh/oat/oat.min.css">
    <script src="https://unpkg.com/@knadh/oat/oat.min.js" defer></script>
    
    <style>
      :root {
        --bg-color: #0f172a; /* Slate 900 */
        --text-color: #f8fafc; /* Slate 50 */
        --accent-color: #3b82f6; /* Blue 500 */
        --border-color: #334155; /* Slate 700 */
      }
      
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        text-align: center;
      }
      
      .glitch-text {
        font-size: clamp(6rem, 15vw, 10rem);
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        line-height: 1;
        margin: 0;
        background: linear-gradient(135deg, #60a5fa 0%, var(--accent-color) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 10px 30px rgba(59, 130, 246, 0.3);
        position: relative;
        display: inline-block;
      }
      
      h2 {
        font-size: clamp(1.5rem, 4vw, 2.5rem);
        font-weight: 700;
        margin: 1.5rem 0 1rem;
      }
      
      p.desc {
        color: #94a3b8; /* Slate 400 */
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 2.5rem;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }
      
      .actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      
      .btn {
        padding: 0.8rem 2rem;
        font-size: 1.05rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        border-radius: 50px;
        transition: all 0.3s ease;
        text-decoration: none;
        font-weight: 500;
      }
      
      .btn-primary {
        background-color: var(--accent-color);
        color: white;
        box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
      }
      
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        background-color: #2563eb;
      }
      
      .btn-outline {
        border: 2px solid var(--border-color);
        color: var(--text-color);
      }
      
      .btn-outline:hover {
        border-color: #475569;
        transform: translateY(-2px);
        background-color: rgba(255, 255, 255, 0.05);
      }
      
      .tech-decor {
        margin-top: 4rem;
        opacity: 0.5;
      }
      
      .tech-decor i {
        font-size: 3rem;
        color: var(--border-color);
        animation: pulse 2s infinite;
      }
      
      .tech-decor p {
        font-family: monospace;
        font-size: 0.85rem;
        color: #64748b;
        margin-top: 1rem;
      }
      
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 0.8; }
        100% { transform: scale(1); opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <!-- 404 Section -->
    <main style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px;">
        <h1 style="font-size: 3rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-color);">404</h1>
        <p style="font-size: 1.25rem; color: #94a3b8; margin-bottom: 2rem; max-width: 600px; line-height: 1.6;">
            Engineer Playbook doesn't have this yet, or you are lost, but you can request a feature by reaching out to maintainers directly.
        </p>
        <a href="https://anmolthukral.github.io/" class="btn btn-primary" style="text-decoration: none;">Go to Playbook Profile</a>
    </main>
  </body>
</html>
